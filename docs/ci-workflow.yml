name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    # A throwaway Postgres so the postgres connector's conformance test runs (not skipped).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5

    env:
      # DuckDB conformance + e2e always run; Postgres runs against the service above.
      DRIFTWATCH_TEST_PG_DSN: postgresql://postgres:postgres@localhost:5432/postgres
      # Snowflake tests stay skipped unless creds are provided as repo secrets.

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install ".[dev,postgres,duckdb]"
      - run: pytest -q
