name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    # A real Postgres so the postgres connector conformance tests run (not skipped).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DRIFTWATCH_TEST_PG_DSN: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install ".[dev,postgres,duckdb]"
      - run: pytest -q

  scenarios:
    # The behaviour matrix (drift density, key types, lag/recheck, tuning + fuzz) on
    # real DuckDB. Each script asserts correctness and exits non-zero on a regression.
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ".[dev,duckdb]"
      - run: PYTHONPATH=src python examples/scenarios/density.py
      - run: PYTHONPATH=src python examples/scenarios/key_types.py
      - run: PYTHONPATH=src python examples/scenarios/lag_recheck.py
      - run: PYTHONPATH=src python examples/scenarios/tuning_edges_fuzz.py

  demo:
    # The end-to-end Postgres -> DuckDB demo, proving the cross-engine path on every push.
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: demo
        ports:
          - 55432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      PG_DSN: postgresql://postgres:demo@localhost:55432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ".[postgres,duckdb]"
      - run: PYTHONPATH=src python examples/demo.py
